<div id="tools">
    <button (click)="goCreateArticle()" class="violet-btn">
        Créer un article
    </button>

    <div id="filter" (click)="toggleSortOrder()">
        Trier par
        @if (sortByAsc) {
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-move-down-icon lucide-move-down">
            <path d="M8 18L12 22L16 18" />
            <path d="M12 2V22" />
        </svg>
        } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-move-up-icon lucide-move-up">
            <path d="M8 6L12 2L16 6" />
            <path d="M12 2V22" />
        </svg>
        }
    </div>
</div>

<div id="articles">
    @for (article of articles; track article.id) {
    <article (click)="goArticleDetail(article.id)">
        <h3 class="title">{{ article.title }}</h3>
        <div class="detail">
            <span>{{ article.createdAt }}</span><span>{{ article.userName }}</span>
        </div>
        <p class="content">
            {{ article.content }}
        </p>
    </article>
    } @empty {
    <p>Aucun article trouvé.</p>
    }
</div>
